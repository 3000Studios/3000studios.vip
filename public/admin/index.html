<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3000Studios Admin Dashboard</title>
  <style>
    body {font-family: system-ui, sans-serif; background:#111;color:#eee;margin:0;padding:2rem;}
    h1{color:#0ff;}
    .site{margin-bottom:1rem;padding:1rem;border:1px solid #333;border-radius:8px;}
    .status{font-weight:bold;}
    button{background:#0ff;color:#111;padding:0.4rem 0.8rem;border:none;border-radius:4px;cursor:pointer;}
    button:hover{background:#0cc;}
  </style>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <div id="sites"></div>
  <script>
    const sites = [
      {name:'referrals.live', url:'https://referrals.live'},
      {name:'getnexa.space', url:'https://getnexa.space'},
      {name:'theunitedstates.site', url:'https://theunitedstates.site'}
    ];
    const container = document.getElementById('sites');
    sites.forEach(site=>{
      const div=document.createElement('div');
      div.className='site';
      div.innerHTML=`<strong>${site.name}</strong><br/><span class='status'>Checking...</span>`;
      fetch(site.url,{method:'HEAD'}).then(r=>{
        const status=r.ok?'✅ Online':'❌ Offline';
        div.querySelector('.status').textContent=status;
      }).catch(()=>{div.querySelector('.status').textContent='❌ Offline';});
      container.appendChild(div);
    });
  </script>
</body>
</html>
